      <path d="M129 136c-27.6 0-50 22.4-50 50v19H67c-11 0-20 9-20 20v54c0 11 9 20 20 20h124c11 0 20-9 20-20v-54c0-11-9-20-20-20h-12v-19c0-27.6-22.4-50-50-50Zm-28 69v-19c0-15.5 12.5-28 28-28s28 12.5 28 28v19H101Z" fill="#ECFFF7"/>
